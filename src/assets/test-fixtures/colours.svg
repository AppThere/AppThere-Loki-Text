<?xml version="1.0" encoding="UTF-8"?>
<!-- Test fixture for Phase 1 colour round-trip verification -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <g inkscape:label="Layer 1" inkscape:groupmode="layer" id="layer1"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape">
    <!-- Red rect: fill="#ff0000" -->
    <rect id="red-rect" x="10" y="10" width="100" height="80" style="fill:#ff0000;stroke:none"/>
    <!-- Semi-transparent blue ellipse -->
    <ellipse id="blue-ellipse" cx="220" cy="60" rx="70" ry="50"
             style="fill:rgba(0,0,255,0.5);stroke:none"/>
    <!-- Named-colour green line -->
    <line id="green-line" x1="10" y1="200" x2="390" y2="200"
          style="fill:none;stroke:green;stroke-width:3"/>
  </g>
</svg>
